<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Portfolio</title>

  <link rel="stylesheet" href="style.css">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <!-- Typed.js -->
  <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
</head>

<body>

<!-- 🔥 Loader -->
<div id="loader">
  <div class="spinner"></div>
</div>

<!-- 🌙 Header -->
<header>
  <h2 class="logo">MyPortfolio</h2>
  <nav>
    <a href="#about">About</a>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>

  <button onclick="toggleDark()" class="toggle">🌙</button>
</header>

<!-- ✨ About -->
<section id="about" data-aos="fade-up">
  <img src="profile.jpg" class="profile">

  <h1>Hello, I'm <span id="name"></span></h1>

  <p>
    Senior Full Stack Developer with experience in React, Node.js, PHP, Python, AWS and DevOps tools.
  </p>
</section>

<!-- ✨ Skills -->
<section id="skills" data-aos="fade-up">
  <h2>Skills</h2>

  <div class="grid">
    <div class="card">HTML</div>
    <div class="card">CSS</div>
    <div class="card">JavaScript</div>
    <div class="card">React</div>
    <div class="card">Node.js</div>
    <div class="card">Python</div>
  </div>
</section>

<!-- ✨ Projects -->
<section id="projects" data-aos="fade-up">
  <h2>Projects</h2>

  <div class="filters">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('web')">Web</button>
    <button onclick="filter('app')">App</button>
  </div>

  <div class="projects">
    <div class="project web">News Website</div>
    <div class="project app">Food App</div>
    <div class="project web">E-commerce</div>
  </div>
</section>

<!-- ✨ Contact -->
<section id="contact" data-aos="fade-up">
  <h2>Contact Me</h2>

  <input type="text" id="input" placeholder="Write message">
  <button onclick="addMsg()">Send</button>

  <div id="messages"></div>
</section>

<!-- 🔥 Popup -->
<div id="popup">
  Message Sent!
  <button onclick="closePopup()">OK</button>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="script.js"></script>

</body>
</html>
